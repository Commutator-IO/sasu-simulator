name: Déploiement GitHub Pages

on:
  push:
    branches: [main]
  # Les contrôles tournent aussi sur les pull requests ; seul le déploiement
  # est réservé à main.
  pull_request:
    branches: [main]
  workflow_dispatch:

# Jeton nécessaire au déploiement Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Un seul déploiement à la fois, sans annuler celui qui est en cours.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Construire
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # `--deny-warnings` est indispensable : sans lui oxlint signale les
      # avertissements mais sort avec le code 0, et l'étape ne peut jamais
      # échouer.
      - name: Lint
        run: npm run lint

      # Les barèmes fiscaux ne partent pas en production sans leurs tests.
      # Vitest sort en erreur aussi bien sur un test rouge que s'il ne trouve
      # aucun fichier de test : la suite ne peut pas disparaître en silence.
      - name: Tests du moteur de calcul
        run: npm test

      # `npm run build` enchaîne `tsc -b` puis `vite build` : les erreurs de
      # typage font donc échouer cette étape.
      - name: Build
        run: npm run build
        env:
          # Un site de projet est servi sous /<dépôt>/ : Vite doit préfixer les
          # URL des assets. Déduit du dépôt pour survivre à un renommage.
          BASE_PATH: /${{ github.event.repository.name }}/

      - uses: actions/configure-pages@v5
        if: github.event_name != 'pull_request'

      - uses: actions/upload-pages-artifact@v3
        if: github.event_name != 'pull_request'
        with:
          path: dist

  deploy:
    name: Déployer
    needs: build
    # Une pull request ne déploie pas : elle ne fait que passer les contrôles.
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
